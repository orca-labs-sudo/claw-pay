services:
  facilitator:
    build: .
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"   # nur localhost — Nginx davor schalten
    env_file:
      - .env
    volumes:
      - tx_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  tx_data:
